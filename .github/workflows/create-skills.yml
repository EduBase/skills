---
name: Update skills
run-name: Updating skills with changes made by ${{ github.actor }}
on:
  push:
    branches:
      - main
    paths-ignore:
      - ".*"
      - "*.md"
      - "LICENSE"
      - ".github/**"
      - ".scripts/**"
      - "*/*.skill"
    tags-ignore:
      - "**"
jobs:
  update-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit-changes.outputs.changed }}
      old_tag: ${{ steps.commit-changes.outputs.old_tag }}
      new_tag: ${{ steps.commit-changes.outputs.new_tag }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-tags: true
          fetch-depth: 0
      - name: Generate skill files
        run: |
          ./.scripts/generate-skills.sh
      - name: Commit changes
        id: commit-changes
        run: |
          ./.scripts/commit-changes.sh
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: update-skills
    if: needs.update-skills.outputs.changed == 'true'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-skills.outputs.new_tag }}
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ needs.update-skills.outputs.new_tag }}
          previous_tag: ${{ needs.update-skills.outputs.old_tag }}
          files: |
            */*.skill
